<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Party Games</title>
  <meta name="description" content="A polished collection of party games for one device or a shared online room." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#f5f7f8" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#111718" media="(prefers-color-scheme: dark)" />

  <!-- iOS: full-screen "Add to Home Screen" app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Party Games" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" href="icon-192.png" />

  <script>
    (function () {
      try {
        var t = localStorage.getItem("together_theme") || "auto";
        if (t === "cute") t = "pink";
        if (t !== "auto") document.documentElement.setAttribute("data-theme", t);
        var colors = { light: "#f5f7f8", dark: "#111718", pink: "#fceef3" };
        var themeColor = t === "auto"
          ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? colors.dark : colors.light)
          : (colors[t] || colors.light);
        document.querySelectorAll('meta[name="theme-color"]').forEach(function (meta) {
          meta.setAttribute("content", themeColor);
        });
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" aria-live="polite"></div>

  <!-- Vendored libraries (expose window.Peer and window.QRCode) -->
  <script src="vendor/peerjs.min.js"></script>
  <script src="vendor/qrcode.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
