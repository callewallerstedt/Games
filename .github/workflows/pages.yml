name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/multiplayer-games-website-l0pkf8
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Create/enable the Pages site automatically if it isn't set up yet.
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the static site (no build step).
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
